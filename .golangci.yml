version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - misspell
    - revive

linters-settings:
  errcheck:
    check-type-assertions: true
  revive:
    rules:
      - name: exported
        severity: warning

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Allow formatted output in cmd layer
    - path: cmd/
      linters:
        - forbidigo
